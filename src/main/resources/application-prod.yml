spring:
  application:
    name: discodeit
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: never

logging:
  level:
    root: INFO
    com.sprint.mission.discodeit: INFO
management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"

discodeit:
  storage:
    type: local
    local:
      root-path: ./uploads