spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none # ?? ??? update, ??? none ??
    show-sql: true       # ?? ?? ??
    properties:
      hibernate:
        format_sql: true # SQL ??? ???
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
  h2:
    console:
      enabled: true
      path: /h2-console
logging:
  level:
    root: info
    com.sprint.mission.discodeit: debug
    org.hibernate.jdbc.bind: trace
    org.hibernate.SQL: info
discodeit:
  storage:
    type: local
    local:
      root-path: ./uploads
server:
  port: 8080