spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
  h2:
    console:
      enabled: true
      path: /h2-console
logging:
  level:
    root: info
    com.sprint.mission.discodeit: debug
    org.hibernate.jdbc.bind: trace
    org.hibernate.SQL: info
management:
  endpoints:
    web:
      exposure:
        include: "health,info,loggers,metrics"
        exclude: ""
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
info:
  app:
    name: Discodeit
    version: 1.7.0
    java:
      version: 17
    spring:
      boot:
        version: 3.4.0
    datasource:
      url: ${spring.datasource.url}
      driver-class-name: ${spring.datasource.driver-class-name}
      storage:
        type: ${discodeit.storage.type}
        root-path: ${discodeit.storage.local.root-path}
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
discodeit:
  storage:
    type: local
    local:
      root-path: ./uploads
server:
  port: 8080